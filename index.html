<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glicemia App PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 15px; background: #f4f4f4; }
h2 { text-align: center; }

.card {
    padding: 12px;
    border-radius: 12px;
    margin: 10px 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.colazione { background: #d0ebff; }
.pranzo { background: #ffe8cc; }
.cena { background: #e7ddff; }

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 8px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #2c7be5;
    color: white;
}

table {
    width: 100%;
    margin-top: 15px;
    background: white;
    border-collapse: collapse;
}

td, th {
    padding: 8px;
    border: 1px solid #ccc;
    text-align: center;
}

canvas { margin-top: 20px; background: white; }

.dose {
    font-weight: bold;
    margin-top: 5px;
    color: #0b7285;
}
</style>
</head>

<body>

<h2>📊 Glicemia App PRO</h2>

<input type="date" id="data">

<div style="display:flex; gap:10px;">
<button onclick="oggi()">📅 Oggi</button>
<button onclick="ieri()">⏪ Ieri</button>
</div>

<!-- COLAZIONE -->
<div class="card colazione">
<h3>🌅 Colazione</h3>
<input type="number" id="colazione" placeholder="Glicemia" oninput="liveCalc()">
<div id="dose_col" class="dose"></div>
<input type="number" id="ins_colazione" placeholder="Insulina reale">
</div>

<!-- PRANZO -->
<div class="card pranzo">
<h3>🌞 Pranzo</h3>
<input type="number" id="pranzo" placeholder="Glicemia" oninput="liveCalc()">
<div id="dose_pra" class="dose"></div>
<input type="number" id="ins_pranzo" placeholder="Insulina reale">
</div>

<!-- CENA -->
<div class="card cena">
<h3>🌙 Cena</h3>
<input type="number" id="cena" placeholder="Glicemia" oninput="liveCalc()">
<div id="dose_cen" class="dose"></div>
<input type="number" id="ins_cena" placeholder="Insulina reale">
</div>

<button onclick="salva()">💾 Salva</button>

<table id="tabella"></table>

<canvas id="grafico"></canvas>

<script>

let dati = JSON.parse(localStorage.getItem("glicemia")) || [];
let chart;

document.addEventListener("DOMContentLoaded", oggi);

function oggi() {
    data.value = new Date().toISOString().split("T")[0];
}

function ieri() {
    let d = new Date();
    d.setDate(d.getDate() - 1);
    data.value = d.toISOString().split("T")[0];
}

// 💉 TABELLA DOTTORESSA
function calcolaInsulina(valore, pasto) {

    let tabella = [
        {min:80, max:120, col:5, pra:6, cen:5},
        {min:120, max:160, col:6, pra:7, cen:6},
        {min:160, max:200, col:7, pra:8, cen:7},
        {min:200, max:240, col:8, pra:9, cen:8},
        {min:240, max:280, col:9, pra:10, cen:9},
        {min:280, max:320, col:10, pra:11, cen:10}
    ];

    let riga = tabella.find(r => valore >= r.min && valore < r.max);

    if (!riga) {
        if (valore < 80) return 0;
        if (valore >= 320) {
            if (pasto === "col") return 10;
            if (pasto === "pra") return 11;
            if (pasto === "cen") return 10;
        }
    }

    if (pasto === "col") return riga.col;
    if (pasto === "pra") return riga.pra;
    if (pasto === "cen") return riga.cen;
}

// ⚡ LIVE
function liveCalc() {

    let c = document.getElementById("colazione").value;
    let p = document.getElementById("pranzo").value;
    let ce = document.getElementById("cena").value;

    if (c) {
        document.getElementById("dose_col").innerText =
            "💉 Dose consigliata: " + calcolaInsulina(Number(c), "col") + " U";
    } else {
        document.getElementById("dose_col").innerText = "";
    }

    if (p) {
        document.getElementById("dose_pra").innerText =
            "💉 Dose consigliata: " + calcolaInsulina(Number(p), "pra") + " U";
    } else {
        document.getElementById("dose_pra").innerText = "";
    }

    if (ce) {
        document.getElementById("dose_cen").innerText =
            "💉 Dose consigliata: " + calcolaInsulina(Number(ce), "cen") + " U";
    } else {
        document.getElementById("dose_cen").innerText = "";
    }
}

// 💾 SALVA
function salva() {

    let nuovo = {
        data: data.value,
        colazione: colazione.value,
        pranzo: pranzo.value,
        cena: cena.value,
        ins_colazione: ins_colazione.value || calcolaInsulina(Number(colazione.value), "col"),
        ins_pranzo: ins_pranzo.value || calcolaInsulina(Number(pranzo.value), "pra"),
        ins_cena: ins_cena.value || calcolaInsulina(Number(cena.value), "cen")
    };

    let esiste = dati.find(d => d.data === nuovo.data);

    if (esiste) Object.assign(esiste, nuovo);
    else dati.push(nuovo);

    localStorage.setItem("glicemia", JSON.stringify(dati));

    aggiorna();
}

// 📊 AGGIORNA
function aggiorna() {

    dati.sort((a, b) => new Date(a.data) - new Date(b.data));

    tabella.innerHTML = `
    <tr>
        <th>Data</th>
        <th>Col</th><th>Ins</th>
        <th>Pra</th><th>Ins</th>
        <th>Cena</th><th>Ins</th>
    </tr>`;

    dati.forEach(d => {
        tabella.innerHTML += `
        <tr>
        <td>${d.data}</td>
        <td>${d.colazione}</td><td>${d.ins_colazione}</td>
        <td>${d.pranzo}</td><td>${d.ins_pranzo}</td>
        <td>${d.cena}</td><td>${d.ins_cena}</td>
        </tr>`;
    });

    grafico();
}

// 📈 GRAFICO
function grafico() {

    let labels = dati.map(d => d.data);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("grafico"), {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: "Colazione", data: dati.map(d=>d.colazione) },
                { label: "Pranzo", data: dati.map(d=>d.pranzo) },
                { label: "Cena", data: dati.map(d=>d.cena) }
            ]
        }
    });
}

aggiorna();

</script>

</body>
</html>
