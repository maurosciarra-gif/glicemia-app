<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glicemia App PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 15px; background: #f4f4f4; }
h2 { text-align: center; }

.card {
    padding: 12px;
    border-radius: 12px;
    margin: 10px 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.colazione { background: #d0ebff; }
.pranzo { background: #ffe8cc; }
.cena { background: #e7ddff; }

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 8px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #2c7be5;
    color: white;
}

table {
    width: 100%;
    margin-top: 15px;
    background: white;
    border-collapse: collapse;
}

td, th {
    padding: 8px;
    border: 1px solid #ccc;
    text-align: center;
}

canvas { margin-top: 20px; background: white; }
</style>
</head>

<body>

<h2>📊 Glicemia App PRO</h2>

<input type="date" id="data">

<div style="display:flex; gap:10px;">
<button onclick="oggi()">📅 Oggi</button>
<button onclick="ieri()">⏪ Ieri</button>
</div>

<div class="card colazione">
<h3>🌅 Colazione</h3>
<input type="number" id="colazione" placeholder="Glicemia">
<input type="number" id="ins_colazione" placeholder="Insulina">
</div>

<div class="card pranzo">
<h3>🌞 Pranzo</h3>
<input type="number" id="pranzo" placeholder="Glicemia">
<input type="number" id="ins_pranzo" placeholder="Insulina">
</div>

<div class="card cena">
<h3>🌙 Cena</h3>
<input type="number" id="cena" placeholder="Glicemia">
<input type="number" id="ins_cena" placeholder="Insulina">
</div>

<button onclick="salva()">💾 Salva</button>

<table id="tabella"></table>

<h3 id="media"></h3>

<canvas id="grafico"></canvas>

<h3>📊 Statistiche</h3>
<div id="stats" style="background:white; padding:10px; border-radius:10px;"></div>

<script>

let dati = JSON.parse(localStorage.getItem("glicemia")) || [];
let chart;

document.addEventListener("DOMContentLoaded", oggi);

function oggi() {
    data.value = new Date().toISOString().split("T")[0];
}

function ieri() {
    let d = new Date();
    d.setDate(d.getDate() - 1);
    data.value = d.toISOString().split("T")[0];
}

function salva() {

    let nuovo = {
        data: data.value,
        colazione: colazione.value,
        pranzo: pranzo.value,
        cena: cena.value,
        ins_colazione: ins_colazione.value,
        ins_pranzo: ins_pranzo.value,
        ins_cena: ins_cena.value
    };

    if (!nuovo.data) return alert("Inserisci data");

    let esiste = dati.find(d => d.data === nuovo.data);

    if (esiste) {
        Object.assign(esiste, nuovo);
    } else {
        dati.push(nuovo);
    }

    localStorage.setItem("glicemia", JSON.stringify(dati));

    // backup automatico
    let blob = new Blob([JSON.stringify(dati)], { type: "application/json" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "glicemia_backup.json";
    a.click();

    aggiorna();

    document.querySelectorAll("input").forEach(i => i.value = "");
}

function aggiorna() {

    dati.sort((a, b) => new Date(a.data) - new Date(b.data));

    let tab = document.getElementById("tabella");

    tab.innerHTML = `
    <tr>
        <th>Data</th>
        <th>Col</th><th>Ins</th>
        <th>Pra</th><th>Ins</th>
        <th>Cena</th><th>Ins</th>
    </tr>`;

    dati.forEach(d => {
        tab.innerHTML += `
        <tr>
        <td>${d.data}</td>
        <td>${d.colazione}</td><td>${d.ins_colazione}</td>
        <td>${d.pranzo}</td><td>${d.ins_pranzo}</td>
        <td>${d.cena}</td><td>${d.ins_cena}</td>
        </tr>`;
    });

    grafico();
    statistiche();
}

function grafico() {

    let labels = dati.map(d => d.data);

    if (chart) chart.destroy();

    chart = new Chart(grafico, {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: "Colazione", data: dati.map(d=>d.colazione) },
                { label: "Pranzo", data: dati.map(d=>d.pranzo) },
                { label: "Cena", data: dati.map(d=>d.cena) }
            ]
        }
    });
}

function statistiche() {

    if (dati.length === 0) return;

    let c=0,p=0,ce=0;

    dati.forEach(d=>{
        c+=Number(d.colazione)||0;
        p+=Number(d.pranzo)||0;
        ce+=Number(d.cena)||0;
    });

    document.getElementById("stats").innerHTML = `
    📊 Media Colazione: ${(c/dati.length).toFixed(1)}<br>
    📊 Media Pranzo: ${(p/dati.length).toFixed(1)}<br>
    📊 Media Cena: ${(ce/dati.length).toFixed(1)}
    `;
}

aggiorna();

</script>

</body>
</html>
