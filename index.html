<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Glicemia PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 10px;
}

.card {
    background: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
}

input {
    width: 100%;
    padding: 8px;
    margin: 4px 0;
}

button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #007bff;
    color: white;
}

h2 { text-align: center; }
</style>
</head>

<body>

<h2>Glicemia PRO</h2>

<div class="card">
<input id="paziente" placeholder="Nome Paziente">
<input type="date" id="data">

<input id="glicemiaColazione" placeholder="Glicemia Colazione">
<input id="insulinaColazione" placeholder="Insulina Colazione">
<input id="glicemiaDopoColazione" placeholder="Dopo Colazione">

<input id="glicemiaPranzo" placeholder="Glicemia Pranzo">
<input id="insulinaPranzo" placeholder="Insulina Pranzo">
<input id="glicemiaDopoPranzo" placeholder="Dopo Pranzo">

<input id="glicemiaCena" placeholder="Glicemia Cena">
<input id="insulinaCena" placeholder="Insulina Cena">
<input id="glicemiaDopoCena" placeholder="Dopo Cena">

<input id="insulinaNotte" placeholder="Insulina Notte">

<button onclick="salva()">SALVA</button>
<button onclick="syncCloud()">SINCRONIZZA CLOUD</button>
<button onclick="exportPDF()">EXPORT PDF</button>

<input type="file" onchange="importJSON(event)">
</div>

<canvas id="grafico"></canvas>

<script type="module">

// 🔥 CONFIG FIREBASE (INSERISCI I TUOI DATI)
const firebaseConfig = {
    apiKey: "TUO_API_KEY",
    authDomain: "TUO_DOMINIO",
    projectId: "TUO_PROJECT_ID"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==========================
// STORAGE
// ==========================

function getLocal() {
    return JSON.parse(localStorage.getItem("glicemia") || "[]");
}

function setLocal(data) {
    localStorage.setItem("glicemia", JSON.stringify(data));
}

// ==========================
// SALVATAGGIO
// ==========================

function getVal(id) {
    let v = document.getElementById(id).value;
    return v === "" ? null : v;
}

function salva() {

    let record = {
        paziente: getVal("paziente"),
        data: getVal("data"),

        glicemiaColazione: getVal("glicemiaColazione"),
        insulinaColazione: getVal("insulinaColazione"),
        glicemiaDopoColazione: getVal("glicemiaDopoColazione"),

        glicemiaPranzo: getVal("glicemiaPranzo"),
        insulinaPranzo: getVal("insulinaPranzo"),
        glicemiaDopoPranzo: getVal("glicemiaDopoPranzo"),

        glicemiaCena: getVal("glicemiaCena"),
        insulinaCena: getVal("insulinaCena"),
        glicemiaDopoCena: getVal("glicemiaDopoCena"),

        insulinaNotte: getVal("insulinaNotte")
    };

    if (!record.data) {
        alert("Inserisci data");
        return;
    }

    let dati = getLocal();

    // ❌ NO DUPLICATI DATA
    dati = dati.filter(r => !(r.data === record.data && r.paziente === record.paziente));

    dati.push(record);
    dati.sort((a,b)=>a.data.localeCompare(b.data));

    setLocal(dati);
    alert("Salvato");

    aggiornaGrafico();
}

// ==========================
// SYNC CLOUD
// ==========================

async function syncCloud() {

    let dati = getLocal();

    for (let r of dati) {
        let id = r.paziente + "_" + r.data;

        await db.collection("glicemia").doc(id).set(r);
    }

    // DOWNLOAD CLOUD
    let snap = await db.collection("glicemia").get();

    let cloud = [];
    snap.forEach(doc => cloud.push(doc.data()));

    mergeData(cloud);

    alert("Sync completata");
}

// ==========================
// MERGE INTELLIGENTE
// ==========================

function mergeData(nuovi) {

    let locali = getLocal();

    let map = {};

    [...locali, ...nuovi].forEach(r => {

        let key = r.paziente + "_" + r.data;

        if (!map[key]) {
            map[key] = r;
        } else {
            // 🔥 MERGE CAMPI (NON SOVRASCRIVE SE ESISTE)
            for (let k in r) {
                if (map[key][k] == null && r[k] != null) {
                    map[key][k] = r[k];
                }
            }
        }
    });

    let result = Object.values(map);
    result.sort((a,b)=>a.data.localeCompare(b.data));

    setLocal(result);
    aggiornaGrafico();
}

// ==========================
// IMPORT JSON
// ==========================

function importJSON(event) {

    let file = event.target.files[0];
    let reader = new FileReader();

    reader.onload = function(e) {
        let json = JSON.parse(e.target.result);
        mergeData(json);
        alert("Import OK");
    };

    reader.readAsText(file);
}

// ==========================
// GRAFICO
// ==========================

let chart;

function aggiornaGrafico() {

    let dati = getLocal();

    let labels = dati.map(d => d.data);
    let valori = dati.map(d => d.glicemiaColazione || null);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("grafico"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Glicemia Colazione',
                data: valori
            }]
        }
    });
}

aggiornaGrafico();

// ==========================
// PDF
// ==========================

function exportPDF() {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let dati = getLocal();

    let y = 10;

    dati.forEach(d => {
        doc.text(`${d.data} - ${d.glicemiaColazione || ""}`, 10, y);
        y += 6;
    });

    doc.save("report_glicemia.pdf");
}

</script>

</body>
</html>
