<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glicemia App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 15px; background: #f4f4f4; }
h2 { text-align: center; }

.card {
    padding: 12px;
    border-radius: 12px;
    margin: 10px 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.colazione { background: #d0ebff; }
.pranzo { background: #ffe8cc; }
.cena { background: #e7ddff; }

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    background: #2c7be5;
    color: white;
}

table {
    width: 100%;
    margin-top: 15px;
    background: white;
    border-collapse: collapse;
}

td, th {
    padding: 8px;
    border: 1px solid #ccc;
    text-align: center;
}

canvas { margin-top: 20px; background: white; }
</style>
</head>

<body>

<h2>📊 Glicemia App</h2>

<input type="date" id="data">

<div style="display:flex; gap:10px;">
<button onclick="oggi()">📅 Oggi</button>
<button onclick="ieri()">⏪ Ieri</button>
</div>

<div class="card colazione">
<h3>🌅 Colazione</h3>
<input type="number" id="colazione">
</div>

<div class="card pranzo">
<h3>🌞 Pranzo</h3>
<input type="number" id="pranzo">
</div>

<div class="card cena">
<h3>🌙 Cena</h3>
<input type="number" id="cena">
</div>

<div class="card">
<h3>💉 Insulina</h3>
<input type="number" id="insulina">
</div>

<button onclick="salva()">💾 Salva</button>
<button onclick="promemoria()">🔔 Promemoria</button>

<h3 id="alert"></h3>

<table id="tabella"></table>

<h3 id="media"></h3>

<canvas id="grafico"></canvas>

<h3>📊 Statistiche</h3>
<div id="stats" style="background:white; padding:10px; border-radius:10px;"></div>

<script>

let dati = JSON.parse(localStorage.getItem("glicemia")) || [];
let chart;

// data automatica
document.addEventListener("DOMContentLoaded", () => {
    oggi();
});

function oggi() {
    data.value = new Date().toISOString().split("T")[0];
}

function ieri() {
    let d = new Date();
    d.setDate(d.getDate() - 1);
    data.value = d.toISOString().split("T")[0];
}

function salva() {
    let nuovo = {
        data: data.value,
        colazione: colazione.value,
        pranzo: pranzo.value,
        cena: cena.value,
        insulina: insulina.value
    };

    if (!nuovo.data) return alert("Inserisci data");

    let esiste = dati.find(d => d.data === nuovo.data);

    if (esiste) {
        esiste.colazione = nuovo.colazione;
        esiste.pranzo = nuovo.pranzo;
        esiste.cena = nuovo.cena;
        esiste.insulina = nuovo.insulina;
    } else {
        dati.push(nuovo);
    }

    localStorage.setItem("glicemia", JSON.stringify(dati));

    // backup automatico
    let blob = new Blob([JSON.stringify(dati)], { type: "application/json" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "glicemia_backup.json";
    a.click();

    aggiorna();

    document.querySelectorAll("input").forEach(i => i.value = "");
}

function aggiorna() {

    dati.sort((a, b) => new Date(a.data) - new Date(b.data));

    let tab = document.getElementById("tabella");
    tab.innerHTML = "<tr><th>Data</th><th>Col</th><th>Pra</th><th>Cena</th><th>Ins</th></tr>";

    let totale = 0;

    dati.forEach(d => {
        tab.innerHTML += `<tr>
        <td>${d.data}</td>
        <td>${d.colazione}</td>
        <td>${d.pranzo}</td>
        <td>${d.cena}</td>
        <td>${d.insulina}</td>
        </tr>`;
        totale += Number(d.insulina);
    });

    document.getElementById("media").innerText =
        "Media insulina: " + (totale/dati.length || 0).toFixed(2);

    grafico();
    statistiche();
}

function grafico() {

    let labels = dati.map(d => d.data);

    if (chart) chart.destroy();

    chart = new Chart(grafico, {
        type: 'line',
        data: {
            labels,
            datasets: [
                { label: "Colazione", data: dati.map(d=>d.colazione) },
                { label: "Pranzo", data: dati.map(d=>d.pranzo) },
                { label: "Cena", data: dati.map(d=>d.cena) }
            ]
        }
    });
}

function statistiche() {

    if (dati.length === 0) return;

    let sommaC=0,sommaP=0,sommaCe=0,fuori=0;

    dati.forEach(d => {
        let c=Number(d.colazione)||0;
        let p=Number(d.pranzo)||0;
        let ce=Number(d.cena)||0;

        sommaC+=c; sommaP+=p; sommaCe+=ce;

        if (c>140||p>140||ce>140) fuori++;
    });

    document.getElementById("stats").innerHTML = `
    📊 Media Colazione: <b>${(sommaC/dati.length).toFixed(1)}</b><br>
    📊 Media Pranzo: <b>${(sommaP/dati.length).toFixed(1)}</b><br>
    📊 Media Cena: <b>${(sommaCe/dati.length).toFixed(1)}</b><br>
    <hr>
    🎯 Fuori range: <b>${((fuori/dati.length)*100).toFixed(1)}%</b>
    `;
}

function promemoria() {
    Notification.requestPermission().then(p => {
        if (p === "granted") {
            setInterval(() => {
                new Notification("Controlla glicemia");
            }, 86400000);
        }
    });
}

aggiorna();

</script>

</body>
</html>
